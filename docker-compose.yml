services:
  mike-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mike-backend
    ports:
      - "8095:3001"
    env_file:
      - .env.defaults    # committed config (non-secret)
      - .env             # secrets, regenerated from Infisical by scripts/deploy.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  mike-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the client bundle at build time.
        # Values come from the .env file in this directory (compose substitution),
        # which scripts/deploy.sh regenerates from Infisical before each build.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    container_name: mike-frontend
    ports:
      - "8094:3000"
    env_file:
      - .env.defaults
      - .env
    depends_on:
      mike-backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
